name: domino_lwa3rin
description: Domino Lwa3rin - Double-Six Domino Game with Local Multiplayer
version: 2.1.0+2
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local multiplayer (Wi-Fi / Bluetooth P2P)
  nearby_connections: ^4.1.0

  # Permissions
  permission_handler: ^11.3.0

  # Shared preferences (settings persistence)
  shared_preferences: ^2.2.3

  # Vibration feedback
  vibration: ^3.1.8

  # Sound effects (Web Audio equivalent)
  audioplayers: ^6.0.0

  # Firebase (Online Multiplayer)
  firebase_core: ^3.1.1
  firebase_database: ^11.1.1
  firebase_auth: ^5.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icon/
